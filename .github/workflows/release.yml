name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - name: Upload binary to release
        run: |
          cp target/release/dependency-drift dependency-drift-linux-x86_64
          sha256sum dependency-drift-linux-x86_64 > dependency-drift-linux-x86_64.sha256
          gh release create "$GITHUB_REF_NAME" --generate-notes || true
          gh release upload "$GITHUB_REF_NAME" dependency-drift-linux-x86_64 dependency-drift-linux-x86_64.sha256 --clobber
        env:
          GH_TOKEN: ${{ github.token }}
      - uses: actions/attest@v4
        with:
          subject-path: dependency-drift-linux-x86_64

  update-major-tag:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v1')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Update v1 tag
        run: |
          git tag -f v1
          git push -f origin v1
